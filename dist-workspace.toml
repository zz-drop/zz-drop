[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "homebrew"]
# Homebrew tap to publish formulae to (auto-updated by cargo-dist
# on each release).
tap = "zz-drop/homebrew-zz-drop"
# Auto-publish to the tap as part of the release job.
publish-jobs = ["homebrew"]
# Also exercise homebrew publish on prereleases (`v0.x.y-pre.N`).
# Remove or set to false later if you want stable-only formula
# updates.
publish-prereleases = true
# Custom jobs spliced into release.yml after announce. Each entry
# points to a reusable workflow (`workflow_call`) inside this
# repo. ORDER MATTERS:
#   patch-installer — appends shell-detection + auto-completion
#                     install logic to zz-drop-installer.sh in the
#                     GH release; runs FIRST so sign-release sees
#                     and signs the patched script.
#   sign-release    — minisign-signs every release artifact.
#   patch-formula   — wires SACS completions into the
#                     cargo-dist-generated brew formula.
post-announce-jobs = ["./patch-installer", "./sign-release", "./patch-formula"]
# Target platforms to build apps for (Rust target-triple syntax).
# Unix-only: the local agent uses Unix domain sockets and rustix
# Unix-specific syscalls — Windows is out of scope for v1.
# Both linux-gnu (Ubuntu/Debian/Fedora/Arch/...) and linux-musl
# (Alpine, headless containers) are shipped — the curl installer
# picks the right one via `ldd --version` detection. Pure-rust
# stack (ureq + rustls + ring), no openssl-sys, so musl builds
# need no special workaround.
targets = [
    "aarch64-apple-darwin",
    "aarch64-unknown-linux-gnu",
    "aarch64-unknown-linux-musl",
    "x86_64-apple-darwin",
    "x86_64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
]
# Binary aliases — extra names installers create for each binary.
# cargo-dist handles this uniformly: the curl shell installer
# drops a symlink in install-path, the brew formula populates
# `BINARY_ALIASES` and calls `install_binary_aliases!` to create
# the same symlink in the cellar. Replaces the standalone
# `bin.install_symlink` previously injected by patch-formula.yml.
bin-aliases = { "zz-drop" = ["zz"] }
# Path that installers should place binaries in. Standard XDG
# user-bin location. Already in PATH on most modern Linux distros
# via the ~/.profile snippet (`if [ -d ~/.local/bin ]; then PATH=
# ~/.local/bin:$PATH`). On macOS / Alpine / WSL fresh installs
# the cargo-dist installer adds it to ~/.profile / ~/.zshenv
# automatically (modify_path: true in installer manifest).
install-path = "~/.local/bin"
# Where to host releases
hosting = "github"
# Whether to install an updater program
install-updater = false
