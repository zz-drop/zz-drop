name: Sign release artifacts

# Called from release.yml as a post-announce job (see
# `post-announce-jobs` in dist-workspace.toml). Running inside the
# same workflow run lets us reuse GITHUB_TOKEN — events fired by
# GITHUB_TOKEN don't trigger downstream `release: published`
# workflows, so a standalone `on: release: published` here would
# never fire.
#
# Downloads every artifact, signs each non-manifest file with
# minisign, and uploads the resulting `.minisig` back to the same
# release. Verify with:
#   minisign -Vm <file> -p release-key.pub

on:
  workflow_call:
    inputs:
      plan:
        description: "dist-manifest JSON string from cargo-dist plan"
        required: true
        type: string

permissions:
  contents: write

jobs:
  sign:
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ github.token }}
      TAG: ${{ fromJson(inputs.plan).announcement_tag }}
    steps:
      - name: Install minisign
        run: sudo apt-get update && sudo apt-get install -y minisign

      - name: Download release artifacts
        run: |
          mkdir -p artifacts
          gh release download "$TAG" -R "${{ github.repository }}" -D artifacts
          ls -la artifacts

      - name: Sign artifacts
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          set -euo pipefail
          keyfile="$(mktemp)"
          printf '%s\n' "$MINISIGN_SECRET_KEY" > "$keyfile"
          trap 'shred -u "$keyfile" 2>/dev/null || rm -f "$keyfile"' EXIT
          cd artifacts
          for f in *; do
            case "$f" in
              *.minisig|*.json) continue ;;
            esac
            [ -f "$f" ] || continue
            echo "Signing $f"
            minisign -Sm "$f" -s "$keyfile" < /dev/null
          done
          ls -la *.minisig

      - name: Upload signatures
        run: |
          cd artifacts
          gh release upload "$TAG" *.minisig -R "${{ github.repository }}" --clobber
