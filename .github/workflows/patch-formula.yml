name: Patch brew formula

# Called from release.yml as a post-announce job (see
# `post-announce-jobs` in dist-workspace.toml). cargo-dist's
# homebrew-publish job has already committed the auto-generated
# `Formula/zz-drop.rb` into the tap by the time announce fires;
# this job patches it to wire SACS shell completions inside
# `def install` so they live in the cellar and `brew uninstall`
# reverses them automatically.
#
# The `zz` shorthand symlink is NOT injected here — it is
# declared in `dist-workspace.toml` as `bin-aliases = { "zz-drop"
# = ["zz"] }`. cargo-dist propagates it to both the curl shell
# installer (drops a symlink in `install-path`, i.e. `~/.local/bin`)
# and the brew formula (populates `BINARY_ALIASES` and runs
# `install_binary_aliases!` inside `def install`). Cellar-tracked,
# brew-uninstall-clean.
#
# Idempotent: completions insertion is gated on its own marker
# so re-runs are no-ops.

on:
  workflow_call:
    inputs:
      plan:
        description: "dist-manifest JSON string from cargo-dist plan"
        required: true
        type: string

permissions:
  contents: read

jobs:
  patch:
    runs-on: ubuntu-24.04
    env:
      TAP_REPO: zz-drop/homebrew-zz-drop
      FORMULA: Formula/zz-drop.rb
    steps:
      - name: Clone the tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          git config --global user.name  "zz-drop release bot"
          git config --global user.email "release-bot@users.noreply.github.com"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${TAP_REPO}.git" tap

      - name: Patch formula (SACS completions + caveats)
        working-directory: tap
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import sys
          from pathlib import Path

          p = Path(os.environ["FORMULA"])
          src = p.read_text()

          # Anchor on cargo-dist's `install_binary_aliases!` line:
          # unique to its binary-install template, survives the
          # per-platform `bin.install` lines being conditionalised
          # by OS / arch. FATAL if missing — we refuse to ship a
          # half-patched formula.
          #
          # `generate_completions_from_executable` runs the binary
          # three times during install to capture bash / zsh / fish
          # completion scripts and drops them into
          # `share/{bash-completion/completions,zsh/site-functions,
          # fish/vendor_completions.d}`. Cellar-tracked.
          #
          # Single-line form keeps rubocop's Layout/ArgumentAlignment
          # quiet (multi-line variant must align args under the
          # first arg column); 105 chars including indent, under
          # brew's 118-char line limit.
          anchor = "    install_binary_aliases!\n"
          insertion = (
              "\n"
              "    generate_completions_from_executable("
              "bin/\"zz-drop\", \"--completions\", "
              "shells: [:bash, :zsh, :fish])\n"
          )

          completions_done = "generate_completions_from_executable" in src
          if not completions_done:
              if anchor not in src:
                  sys.exit(
                      f"FATAL: anchor not found in {p}: {anchor!r}. "
                      "cargo-dist install block format may have changed."
                  )
              src = src.replace(anchor, anchor + insertion, 1)
              print("patched: SACS completions wired")
          else:
              print("completions already wired")

          # `def caveats` — surfaced by `brew install` and
          # `brew info`. Tells the operator how to make the
          # shell-completion files (which brew already wrote)
          # actually load. On Apple Silicon the brew prefix
          # isn't in zsh's default `fpath` AND a fresh macOS
          # `.zshrc` typically doesn't call `compinit`, so both
          # need fixing once for SACS to surface candidates.
          # Re-running `zz --setup-completions` after that
          # writes an idempotent block to ~/.zshrc that covers
          # the same fpath + compinit setup; the caveat exists
          # because brew, by policy, never touches dotfiles.
          caveats_done = "def caveats" in src
          if not caveats_done:
              # Inject before the final `end` of the formula
              # class. Brew formulas are always one class, one
              # trailing `end\n` — anchor on that.
              end_anchor_line = "end\n"
              # Find the LAST occurrence (the file ends with it).
              last = src.rfind(end_anchor_line)
              if last == -1:
                  sys.exit("FATAL: formula has no trailing `end`")
              # Heredoc body is plain text — no Ruby string
              # interpolation. We could splice in
              # `\#{HOMEBREW_PREFIX}` to render the absolute brew
              # path, but bare `brew shellenv` works on both Intel
              # and Apple Silicon (brew is already on $PATH —
              # otherwise the operator couldn't have invoked
              # `brew install`).
              caveats_block = (
                  "\n"
                  "  def caveats\n"
                  "    <<~EOS\n"
                  "      Shell completions are installed in the cellar. To make them\n"
                  "      load in your shell, two one-line setups (each runs once):\n"
                  "\n"
                  "        # 1) put brew's completion dirs on $fpath\n"
                  "        echo 'eval \"$(brew shellenv)\"' >> ~/.zprofile\n"
                  "\n"
                  "        # 2) actually load completions in zsh\n"
                  "        echo 'autoload -Uz compinit && compinit' >> ~/.zshrc\n"
                  "\n"
                  "      Open a new terminal, then test with `zz <TAB>`.\n"
                  "\n"
                  "      If you'd rather have zz-drop write a delimited block to your\n"
                  "      rc file in one shot (with framework detection for oh-my-zsh,\n"
                  "      prezto, zinit, etc.), run:\n"
                  "\n"
                  "        zz --setup-completions\n"
                  "\n"
                  "      To check the install at any point: `zz --check-completions`.\n"
                  "    EOS\n"
                  "  end\n"
              )
              src = src[:last] + caveats_block + src[last:]
              print("patched: def caveats added")
          else:
              print("caveats already present")

          p.write_text(src)
          PY

      - name: Commit and push
        working-directory: tap
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          git add "${FORMULA}"
          git commit -m "Wire SACS completions + caveats"
          git push
