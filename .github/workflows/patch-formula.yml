name: Patch brew formula

# Called from release.yml as a post-announce job (see
# `post-announce-jobs` in dist-workspace.toml). cargo-dist's
# homebrew-publish job has already committed the auto-generated
# `Formula/zz-drop.rb` into the tap by the time announce fires;
# this job patches it so `brew install` also wires SACS shell
# completions and a `zz` shorthand. Both are inserted into
# `def install` so they live in the cellar and `brew uninstall`
# reverses them automatically.
#
# Why not a custom `def post_install` for the symlink? brew's
# Formula API has no symmetric `uninstall_postflight` hook (it's
# a Ruby method definition that brew silently accepts and never
# calls), so a symlink created outside the cellar survives as a
# broken link after `brew uninstall`. `bin.install_symlink` puts
# it inside the cellar where brew tracks it.
#
# Idempotent: each insertion is gated on its own marker so
# re-runs are no-ops.

on:
  workflow_call:
    inputs:
      plan:
        description: "dist-manifest JSON string from cargo-dist plan"
        required: true
        type: string

permissions:
  contents: read

jobs:
  patch:
    runs-on: ubuntu-24.04
    env:
      TAP_REPO: zz-drop/homebrew-zz-drop
      FORMULA: Formula/zz-drop.rb
    steps:
      - name: Clone the tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          git config --global user.name  "zz-drop release bot"
          git config --global user.email "release-bot@users.noreply.github.com"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${TAP_REPO}.git" tap

      - name: Patch formula (completions + zz symlink, both cellar-tracked)
        working-directory: tap
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import sys
          from pathlib import Path

          p = Path(os.environ["FORMULA"])
          src = p.read_text()

          # Anchor on cargo-dist's `install_binary_aliases!` line:
          # unique to its binary-install template, survives the
          # per-platform `bin.install` lines being conditionalised
          # by OS / arch. FATAL if missing — we refuse to ship a
          # half-patched formula.
          #
          # Two lines inserted after the anchor:
          # 1. `generate_completions_from_executable` — brew DSL
          #    that runs the binary three times to capture bash,
          #    zsh, fish completion scripts and drops them into
          #    `share/{bash-completion/completions,zsh/site-functions,
          #    fish/vendor_completions.d}`. Cellar-tracked.
          # 2. `bin.install_symlink bin/"zz-drop" => "zz"` — the
          #    `zz` shorthand, also inside the cellar so brew
          #    unlinks it on uninstall. If the user already has a
          #    `zz` in their PATH, brew fails at link time with a
          #    standard "Target ... already exists" message and
          #    the user can `brew link --overwrite` or remove
          #    their conflict.
          #
          # Single-line `generate_completions_from_executable`
          # form keeps rubocop's Layout/ArgumentAlignment quiet
          # (multi-line variant must align args under the first
          # arg column); 105 chars including indent, under brew's
          # 118-char line limit.
          anchor = "    install_binary_aliases!\n"
          insertion = (
              "\n"
              "    generate_completions_from_executable("
              "bin/\"zz-drop\", \"--completions\", "
              "shells: [:bash, :zsh, :fish])\n"
              "    bin.install_symlink bin/\"zz-drop\" => \"zz\"\n"
          )

          # Per-line idempotency: skip if both already present
          # (re-run on already-patched formula); FATAL if only
          # one is present (partial state needs human attention).
          have_completions = "generate_completions_from_executable" in src
          have_symlink = 'bin.install_symlink bin/"zz-drop" => "zz"' in src

          if have_completions and have_symlink:
              print("nothing to do (both already wired)")
              sys.exit(0)

          if have_completions or have_symlink:
              sys.exit(
                  "FATAL: partial patch state — completions wired "
                  "without `zz` symlink, or vice versa. Manual "
                  "cleanup of the formula required."
              )

          if anchor not in src:
              sys.exit(
                  f"FATAL: anchor not found in {p}: {anchor!r}. "
                  "cargo-dist install block format may have changed."
              )

          src = src.replace(anchor, anchor + insertion, 1)
          p.write_text(src)
          print("patched: completions + bin.install_symlink zz")
          PY

      - name: Commit and push
        working-directory: tap
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          git add "${FORMULA}"
          git commit -m "Wire completions + bin.install_symlink zz"
          git push
