name: Patch brew formula

# Called from release.yml as a post-announce job (see
# `post-announce-jobs` in dist-workspace.toml). cargo-dist's
# homebrew-publish job has already committed the auto-generated
# `Formula/zz-drop.rb` into the tap by the time announce fires;
# this job patches it to wire SACS shell completions inside
# `def install` so they live in the cellar and `brew uninstall`
# reverses them automatically.
#
# The `zz` shorthand symlink is NOT injected here — it is
# declared in `dist-workspace.toml` as `bin-aliases = { "zz-drop"
# = ["zz"] }`. cargo-dist propagates it to both the curl shell
# installer (drops a symlink in CARGO_HOME/bin) and the brew
# formula (populates `BINARY_ALIASES` and runs
# `install_binary_aliases!` inside `def install`). Cellar-tracked,
# brew-uninstall-clean.
#
# Idempotent: completions insertion is gated on its own marker
# so re-runs are no-ops.

on:
  workflow_call:
    inputs:
      plan:
        description: "dist-manifest JSON string from cargo-dist plan"
        required: true
        type: string

permissions:
  contents: read

jobs:
  patch:
    runs-on: ubuntu-24.04
    env:
      TAP_REPO: zz-drop/homebrew-zz-drop
      FORMULA: Formula/zz-drop.rb
    steps:
      - name: Clone the tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          git config --global user.name  "zz-drop release bot"
          git config --global user.email "release-bot@users.noreply.github.com"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${TAP_REPO}.git" tap

      - name: Patch formula (SACS completions only)
        working-directory: tap
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import sys
          from pathlib import Path

          p = Path(os.environ["FORMULA"])
          src = p.read_text()

          # Anchor on cargo-dist's `install_binary_aliases!` line:
          # unique to its binary-install template, survives the
          # per-platform `bin.install` lines being conditionalised
          # by OS / arch. FATAL if missing — we refuse to ship a
          # half-patched formula.
          #
          # `generate_completions_from_executable` runs the binary
          # three times during install to capture bash / zsh / fish
          # completion scripts and drops them into
          # `share/{bash-completion/completions,zsh/site-functions,
          # fish/vendor_completions.d}`. Cellar-tracked.
          #
          # Single-line form keeps rubocop's Layout/ArgumentAlignment
          # quiet (multi-line variant must align args under the
          # first arg column); 105 chars including indent, under
          # brew's 118-char line limit.
          anchor = "    install_binary_aliases!\n"
          insertion = (
              "\n"
              "    generate_completions_from_executable("
              "bin/\"zz-drop\", \"--completions\", "
              "shells: [:bash, :zsh, :fish])\n"
          )

          if "generate_completions_from_executable" in src:
              print("nothing to do (completions already wired)")
              sys.exit(0)

          if anchor not in src:
              sys.exit(
                  f"FATAL: anchor not found in {p}: {anchor!r}. "
                  "cargo-dist install block format may have changed."
              )

          src = src.replace(anchor, anchor + insertion, 1)
          p.write_text(src)
          print("patched: SACS completions wired")
          PY

      - name: Commit and push
        working-directory: tap
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          git add "${FORMULA}"
          git commit -m "Wire SACS completions"
          git push
