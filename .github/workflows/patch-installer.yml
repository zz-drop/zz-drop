name: Patch curl installer

# Called from release.yml as a post-announce job (see
# `post-announce-jobs` in dist-workspace.toml). Runs FIRST in
# the post-announce sequence so sign-release.yml then signs
# the patched zz-drop-installer.sh.
#
# What it does: downloads the cargo-dist-generated installer.sh
# from the GH release, appends ~10 lines of POSIX sh that locate
# the freshly-installed `zz-drop` binary and invoke its built-in
# `--setup-completions` flag, then re-uploads the modified asset
# (overwriting the original). The signing job then minisign-signs
# the patched script.
#
# Why this exists: cargo-dist 0.31 ships completions only for
# the brew installer (via generate_completions_from_executable).
# The shell installer drops binaries only. This patch closes the
# gap so the curl|sh path delivers parity with brew on
# Linux / WSL / macOS-without-brew.
#
# The binary owns the wiring logic (zz_drop_core::completions);
# this hook is a thin shim that just calls it. Single source of
# truth for "how SACS gets wired", shared with brew users (via
# the formula's `def caveats`) and the TUI (welcome screen).
#
# Idempotent: a string marker (`__zz_install_completions`) gates
# re-runs to no-op.

on:
  workflow_call:
    inputs:
      plan:
        description: "dist-manifest JSON string from cargo-dist plan"
        required: true
        type: string

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    env:
      TAG: ${{ fromJson(inputs.plan).announcement_tag }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout (for the patch fragment)
        uses: actions/checkout@v6

      - name: Download installer from the release
        run: |
          set -euo pipefail
          gh release download "$TAG" --repo "${{ github.repository }}" \
              --pattern "zz-drop-installer.sh" --dir .
          echo "=== sha256 before patch ==="
          sha256sum zz-drop-installer.sh

      - name: Append shell-detect + auto-completion block
        run: |
          set -euo pipefail
          if grep -q "__zz_install_completions" zz-drop-installer.sh; then
            echo "already patched; skip"
            exit 0
          fi

          # Heredoc body intentionally indented at the same column
          # as the surrounding `run: |` block (10 spaces). YAML's
          # literal block scalar requires every line of the script
          # to share the run-block's indent — un-indented heredoc
          # contents would be parsed as new YAML keys and the
          # workflow file would fail to load with a syntax error.
          # POSIX sh ignores leading whitespace, so the indentation
          # is purely a YAML concern; the appended block runs
          # exactly as intended.
          cat >> zz-drop-installer.sh <<'PATCH'

          # zz-drop: invoke the binary's built-in completion setup.
          # Appended by patch-installer.yml after cargo-dist
          # generated the script. The wiring logic
          # (shell detection, framework detection, XDG paths,
          # delimited rc-file block) lives in
          # `zz_drop_core::completions` so the same algorithm
          # serves curl-installer users, brew users (via the
          # formula's `def caveats`) and TUI welcome-screen users.
          # This hook just locates the freshly-installed binary
          # and calls it. Failures are non-fatal: the binaries are
          # already on disk by the time we get here.
          __zz_install_completions() {
              _zz_bin="${HOME}/.local/bin/zz-drop"
              [ -x "$_zz_bin" ] || _zz_bin="${HOME}/.cargo/bin/zz-drop"
              [ -x "$_zz_bin" ] || {
                  echo "  completion: zz-drop binary not at expected paths; skip"
                  return 0
              }
              # Bash always; matching the binary's own behaviour for
              # containers / cron / SSH non-login sessions where
              # $SHELL is often unset.
              "$_zz_bin" --setup-completions bash 2>&1 | sed 's/^/  /' || true
              # zsh / fish are only wired when $SHELL points at them
              # — their target paths depend on user dotfile config,
              # and we don't want to drop files for shells the user
              # never runs.
              case "$(basename "${SHELL:-}")" in
                  zsh)  "$_zz_bin" --setup-completions zsh  2>&1 | sed 's/^/  /' || true ;;
                  fish) "$_zz_bin" --setup-completions fish 2>&1 | sed 's/^/  /' || true ;;
              esac
              unset _zz_bin
          }
          __zz_install_completions
          PATCH

          echo "=== sha256 after patch ==="
          sha256sum zz-drop-installer.sh
          echo "=== last 12 lines of patched script ==="
          tail -12 zz-drop-installer.sh

      - name: POSIX sh syntax check
        run: |
          set -euo pipefail
          sh -n zz-drop-installer.sh
          echo "POSIX sh syntax: OK"

      - name: Re-upload patched installer (overwrites release asset)
        run: |
          set -euo pipefail
          if grep -q "__zz_install_completions" zz-drop-installer.sh; then
            gh release upload "$TAG" --repo "${{ github.repository }}" \
                --clobber zz-drop-installer.sh
            echo "uploaded patched zz-drop-installer.sh"
          else
            echo "no patch in file (already-patched skip path); nothing to upload"
          fi
