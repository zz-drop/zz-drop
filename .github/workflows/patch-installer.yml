name: Patch curl installer

# Called from release.yml as a post-announce job (see
# `post-announce-jobs` in dist-workspace.toml). Runs FIRST in
# the post-announce sequence so sign-release.yml then signs
# the patched zz-drop-installer.sh.
#
# What it does: downloads the cargo-dist-generated installer.sh
# from the GH release, appends ~30 lines of POSIX sh that detect
# the operator's shell ($SHELL) and write the matching SACS
# completion file to the canonical XDG path, then re-uploads
# the modified asset (overwriting the original). The signing job
# then minisign-signs the patched script.
#
# Why this exists: cargo-dist 0.31 ships completions only for
# the brew installer (via generate_completions_from_executable).
# The shell installer drops binaries only. This patch closes the
# gap so the curl|sh path delivers parity with brew on
# Linux / WSL / macOS-without-brew.
#
# Idempotent: a string marker (`__zz_install_completions`) gates
# re-runs to no-op.

on:
  workflow_call:
    inputs:
      plan:
        description: "dist-manifest JSON string from cargo-dist plan"
        required: true
        type: string

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    env:
      TAG: ${{ fromJson(inputs.plan).announcement_tag }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout (for the patch fragment)
        uses: actions/checkout@v4

      - name: Download installer from the release
        run: |
          set -euo pipefail
          gh release download "$TAG" --repo "${{ github.repository }}" \
              --pattern "zz-drop-installer.sh" --dir .
          echo "=== sha256 before patch ==="
          sha256sum zz-drop-installer.sh

      - name: Append shell-detect + auto-completion block
        run: |
          set -euo pipefail
          if grep -q "__zz_install_completions" zz-drop-installer.sh; then
            echo "already patched; skip"
            exit 0
          fi

          # Heredoc body intentionally indented at the same column
          # as the surrounding `run: |` block (10 spaces). YAML's
          # literal block scalar requires every line of the script
          # to share the run-block's indent — un-indented heredoc
          # contents would be parsed as new YAML keys and the
          # workflow file would fail to load with a syntax error.
          # POSIX sh ignores leading whitespace, so the indentation
          # is purely a YAML concern; the appended block runs
          # exactly as intended.
          cat >> zz-drop-installer.sh <<'PATCH'

          # zz-drop: shell-detect + auto-completion install
          # Appended by patch-installer.yml after cargo-dist
          # generated the script. Detects $SHELL, writes the
          # matching SACS completion file to the canonical XDG
          # path, and prints any extra hint the operator needs.
          # Failures here are non-fatal: install of the binaries
          # already succeeded by the time we get here.
          # For zsh only: ensure ~/.zshrc has the fpath line (and a
          # compinit call when no recognized framework is present).
          # Idempotent + framework-aware:
          #   - if our marker is already in the file, skip entirely
          #   - if a known framework is referenced (oh-my-zsh,
          #     prezto, zinit, antibody, antidote, znap, zimfw,
          #     zplug), only append the fpath line (the framework
          #     owns compinit)
          #   - otherwise append fpath + compinit
          # File is only created when missing; existing content is
          # never reordered or rewritten.
          __zz_zshrc_setup() {
              _zz_zshrc="${ZDOTDIR:-$HOME}/.zshrc"
              _zz_marker="# zz-drop SACS — auto-installed by zz-drop installer"

              if [ -f "$_zz_zshrc" ] && grep -qF "$_zz_marker" "$_zz_zshrc"; then
                  echo "  zsh: $_zz_zshrc already wired (marker present); skip"
                  unset _zz_zshrc _zz_marker
                  return 0
              fi

              _zz_fw=""
              if [ -f "$_zz_zshrc" ]; then
                  for _zz_f in oh-my-zsh ohmyzsh prezto zinit antibody antidote znap zimfw zplug; do
                      if grep -qF "$_zz_f" "$_zz_zshrc"; then
                          _zz_fw="$_zz_f"
                          break
                      fi
                  done
              fi

              [ -f "$_zz_zshrc" ] && [ -s "$_zz_zshrc" ] && printf "\n" >> "$_zz_zshrc"
              if [ -n "$_zz_fw" ]; then
                  {
                      printf "%s (framework detected: %s)\n" "$_zz_marker" "$_zz_fw"
                      printf "fpath=(\$HOME/.zfunc \$fpath)\n"
                  } >> "$_zz_zshrc"
                  echo "  zsh: appended fpath to $_zz_zshrc (framework: $_zz_fw owns compinit)"
              else
                  {
                      printf "%s\n" "$_zz_marker"
                      printf ". \"\$HOME/.local/bin/env\" 2>/dev/null || true\n"
                      printf "fpath=(\$HOME/.zfunc \$fpath)\n"
                      printf "autoload -U compinit && compinit -i\n"
                  } >> "$_zz_zshrc"
                  echo "  zsh: wrote fpath + compinit + PATH-source to $_zz_zshrc"
              fi
              unset _zz_zshrc _zz_marker _zz_fw _zz_f
          }

          __zz_bash_completion_loaded() {
              # Returns 0 if the bash-completion framework looks available
              # at any of the canonical locations across distros + brew.
              [ -f /usr/share/bash-completion/bash_completion ] && return 0
              [ -d /etc/bash_completion.d ] && return 0
              [ -f /etc/profile.d/bash_completion.sh ] && return 0
              [ -f /etc/bash_completion ] && return 0
              [ -f "${HOMEBREW_PREFIX:-/opt/homebrew}/etc/bash_completion" ] && return 0
              [ -f /usr/local/etc/bash_completion ] && return 0
              return 1
          }

          __zz_install_completions() {
              _zz_bin="${HOME}/.local/bin/zz-drop"
              [ -x "$_zz_bin" ] || _zz_bin="${HOME}/.cargo/bin/zz-drop"
              [ -x "$_zz_bin" ] || {
                  echo "  completion: zz-drop binary not at expected paths; skip"
                  return 0
              }

              # bash: install unconditionally regardless of $SHELL. bash is
              # dominant on Linux/WSL and the XDG path is harmless for users
              # who don't run bash. Containers, SSH non-login sessions and
              # cron jobs typically have $SHELL unset — gating on it meant
              # those bash users got no SACS without manual wiring.
              _zz_dest="${XDG_DATA_HOME:-$HOME/.local/share}/bash-completion/completions/zz-drop"
              mkdir -p "$(dirname "$_zz_dest")" 2>/dev/null
              "$_zz_bin" --completions bash > "$_zz_dest" 2>/dev/null && {
                  echo "  bash completion → $_zz_dest"
                  if ! __zz_bash_completion_loaded; then
                      echo "  → bash-completion framework not detected; install via your"
                      echo "    package manager for auto-loading (apt / dnf / pacman / apk"
                      echo "    install bash-completion). Or source the file manually:"
                      echo "      source $_zz_dest"
                  fi
              }

              # zsh / fish: location depends on user dotfile config, so we
              # still gate on $SHELL — running these for users who do not
              # invoke that shell would drop files in unexpected places.
              case "$(basename "${SHELL:-}")" in
                  zsh)
                      _zz_dest="${ZDOTDIR:-$HOME}/.zfunc/_zz"
                      mkdir -p "$(dirname "$_zz_dest")" 2>/dev/null
                      "$_zz_bin" --completions zsh > "$_zz_dest" 2>/dev/null && {
                          echo "  zsh completion → $_zz_dest"
                          __zz_zshrc_setup
                      }
                      ;;
                  fish)
                      _zz_dest="$HOME/.config/fish/completions/zz.fish"
                      mkdir -p "$(dirname "$_zz_dest")" 2>/dev/null
                      "$_zz_bin" --completions fish > "$_zz_dest" 2>/dev/null && {
                          echo "  fish completion → $_zz_dest (auto-loaded)"
                      }
                      ;;
                  ""|bash)
                      # bash already handled above; empty $SHELL just falls through.
                      ;;
                  *)
                      echo "  completion: extra shell '$SHELL' not auto-supported"
                      echo "  → manual: $_zz_bin --completions {bash|zsh|fish} > <path>"
                      ;;
              esac
              unset _zz_bin _zz_dest
          }
          __zz_install_completions
          PATCH

          echo "=== sha256 after patch ==="
          sha256sum zz-drop-installer.sh
          echo "=== last 12 lines of patched script ==="
          tail -12 zz-drop-installer.sh

      - name: POSIX sh syntax check
        run: |
          set -euo pipefail
          sh -n zz-drop-installer.sh
          echo "POSIX sh syntax: OK"

      - name: Re-upload patched installer (overwrites release asset)
        run: |
          set -euo pipefail
          if grep -q "__zz_install_completions" zz-drop-installer.sh; then
            gh release upload "$TAG" --repo "${{ github.repository }}" \
                --clobber zz-drop-installer.sh
            echo "uploaded patched zz-drop-installer.sh"
          else
            echo "no patch in file (already-patched skip path); nothing to upload"
          fi
