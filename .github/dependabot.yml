# Dependabot configuration — supply-chain hygiene for zz-drop.
# Schema: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Two ecosystems are watched:
#  - cargo (workspace root, covers all three workspace members:
#    `.`, `core/`, `tui/`) — daily, because Rust security advisories
#    cycle fast.
#  - github-actions (this `.github/workflows/` tree, including the
#    cargo-dist auto-generated workflows) — weekly, low churn.
#
# Dependabot security alerts (separate from version updates) are
# enabled through the repository's security_and_analysis API; no
# config knob lives in this file for them.
#
# `commit-message.include: scope` is intentionally NOT set — it
# would append `(deps)` to the prefix and produce `build(deps)(deps):`
# / `build(ci)(deps):` titles. The prefix already conveys the
# ecosystem.

version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: daily
      time: "06:00"
      timezone: Europe/Rome
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - rust
    commit-message:
      prefix: "build(deps)"
    groups:
      rust-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Rome
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "build(ci)"
    groups:
      gha-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
